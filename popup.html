<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoaBlockAD</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header>
      <img src="images/icon48.png" alt="Logo" class="logo">
      <h1>GoaBlockAD</h1>
    </header>

    <main>
      <div class="status-card">
        <p class="status-text">Protection : <span id="status-state">ACTIVE</span></p>
        <div class="toggle-row">
          <label class="switch">
            <input type="checkbox" id="toggle-protection" checked>
            <span class="slider round"></span>
          </label>
        </div>
      </div>

      <div class="status-card small-card">
        <p class="status-text-small">Nettoyage Visuel</p>
        <label class="switch small-switch">
          <input type="checkbox" id="toggle-cosmetic" checked>
          <span class="slider round"></span>
        </label>
      </div>

      <div class="stats">
        <div class="stat-item">
          <span class="stat-value" id="blocked-count">0</span>
          <span class="stat-label">Pubs Bloquées</span>
        </div>
      </div>
    </main>

    <footer>
      <button id="btn-open-dashboard" class="btn-dashboard" title="Ouvrir les paramètres">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
        Configuration
      </button>
      <p class="footer-tagline">Profitez du calme du Goa.</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>

</html>
