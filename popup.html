<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoaBlockAD</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header>
      <img src="images/icon48.png" alt="Logo" class="logo">
      <h1>GoaBlockAD</h1>
    </header>

    <main>
      <div class="status-card">
        <p class="status-text">Protection : <span id="status-state">ACTIVE</span></p>
        <div class="toggle-row">
          <label class="switch">
            <input type="checkbox" id="toggle-protection" checked>
            <span class="slider round"></span>
          </label>
        </div>
      </div>

      <div class="status-card small-card">
        <p class="status-text-small">Nettoyage Visuel</p>
        <label class="switch small-switch">
          <input type="checkbox" id="toggle-cosmetic" checked>
          <span class="slider round"></span>
        </label>
      </div>

      <div class="stats">
        <div class="stat-item">
          <span class="stat-value" id="blocked-count">0</span>
          <span class="stat-label">Pubs Bloquées</span>
        </div>
      </div>
    </main>

    <footer>
      <p>Profitez du calme du Goa.</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>

</html>
