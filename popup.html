<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoaBlockAD</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header class="app-bar">
      <img src="images/icon48.png" alt="" class="app-logo">
      <h1 class="app-title">GoaBlockAD</h1>
      <button id="btn-open-dashboard" class="icon-btn" title="Ouvrir les paramètres" aria-label="Paramètres">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M19.14 12.94a7.08 7.08 0 0 0 .06-.94a7.08 7.08 0 0 0-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.63l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.43h-3.84a.5.5 0 0 0-.5.43l-.36 2.54a7.03 7.03 0 0 0-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.68 8.85a.5.5 0 0 0 .12.63l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.63l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.38 1.04.7 1.62.94l.36 2.54a.5.5 0 0 0 .5.43h3.84a.5.5 0 0 0 .5-.43l.36-2.54a7.03 7.03 0 0 0 1.62-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.63l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"/>
        </svg>
      </button>
    </header>

    <main>
      <section class="hero-card" id="hero-card">
        <div class="hero-status">
          <span class="hero-label">Protection</span>
          <span class="hero-state" id="status-state">ACTIVE</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="blocked-count">0</span>
          <span class="stat-label">pubs bloquées</span>
        </div>
      </section>

      <section class="surface list-card">
        <label class="list-row" for="toggle-protection">
          <div class="list-text">
            <span class="list-title">Blocage réseau</span>
            <span class="list-desc">Active toutes les règles de blocage.</span>
          </div>
          <span class="md-switch">
            <input type="checkbox" id="toggle-protection" checked>
            <span class="md-switch-track"><span class="md-switch-thumb"></span></span>
          </span>
        </label>
        <div class="list-divider"></div>
        <label class="list-row" for="toggle-cosmetic">
          <div class="list-text">
            <span class="list-title">Nettoyage visuel</span>
            <span class="list-desc">Masque les emplacements publicitaires restants.</span>
          </div>
          <span class="md-switch">
            <input type="checkbox" id="toggle-cosmetic" checked>
            <span class="md-switch-track"><span class="md-switch-thumb"></span></span>
          </span>
        </label>
      </section>

      <section class="surface site-card">
        <div class="site-info">
          <div class="site-label-row">
            <span class="site-label">Site actuel</span>
            <button class="help-btn" type="button" aria-label="Aide : à quoi sert Autoriser ici ?" tabindex="0">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
              <span class="help-tip" role="tooltip">
                <strong>Autoriser ici</strong> ajoute le site à la <em>whitelist</em> : aucun blocage publicitaire ne s'appliquera sur ce domaine. Utile pour soutenir un site ou débloquer un contenu cassé.
              </span>
            </button>
          </div>
          <span class="site-domain" id="current-domain">—</span>
        </div>
        <button class="md-chip" id="btn-whitelist">Autoriser ici</button>
      </section>

      <section class="pause-row">
        <button class="md-chip md-chip-tonal" id="btn-pause" data-minutes="15">
          <svg class="chip-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5h3v14H8zm5 0h3v14h-3z"/></svg>
          Pause 15 min
        </button>
        <button class="md-chip md-chip-outlined" id="btn-resume" hidden>
          <svg class="chip-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
          Reprendre
        </button>
      </section>
    </main>

    <footer>
      <p class="footer-tagline">Navigation légère et sans pub.</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>

</html>
