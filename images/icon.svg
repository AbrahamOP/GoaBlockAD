<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5DD8F0"/>
      <stop offset="100%" stop-color="#0E92E0"/>
    </linearGradient>
  </defs>

  <!-- Shield: rounded top, gently bulging sides, pronounced taper to a rounded point at bottom -->
  <path fill="url(#shieldGrad)" d="
    M 296 168
    L 728 168
    Q 800 168 800 240
    L 800 478
    C 800 706, 668 866, 512 906
    C 356 866, 224 706, 224 478
    L 224 240
    Q 224 168 296 168
    Z"/>

  <!-- Bold G centered in the shield -->
  <text x="512" y="700" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif"
        font-size="520" font-weight="bold"
        text-anchor="middle" fill="#000">G</text>
</svg>
