name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version à publier (ex: 1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Sync manifest.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          cat manifest.json | grep '"version"'

      - name: Validate manifest and rules
        run: |
          node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('rules.json','utf8'))"

      - name: Build ZIP
        id: build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="GoaBlockAD-v${VERSION}.zip"
          zip -r "$ARTIFACT" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "_metadata/*" \
            -x "*.zip" \
            -x "README.md" \
            -x ".gemini/*" \
            -x "node_modules/*"
          ls -lh "$ARTIFACT"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: GoaBlockAD v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.build.outputs.artifact }}
