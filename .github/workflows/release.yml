name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version à publier (laisser vide pour lire manifest.json)'
        required: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(node -e "console.log(require('./manifest.json').version)")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: v$VERSION"

      - name: Check if release already exists
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse --verify "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No existing tag for v$VERSION — will create release."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync manifest.json version (workflow_dispatch only)
        if: steps.check.outputs.skip == 'false' && github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

      - name: Validate manifest and rules
        if: steps.check.outputs.skip == 'false'
        run: |
          node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('rules.json','utf8'))"

      - name: Build ZIP
        if: steps.check.outputs.skip == 'false'
        id: build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="GoaBlockAD-v${VERSION}.zip"
          zip -r "$ARTIFACT" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "_metadata/*" \
            -x "*.zip" \
            -x "README.md" \
            -x "PRIVACY.md" \
            -x ".gemini/*" \
            -x "node_modules/*"
          ls -lh "$ARTIFACT"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: GoaBlockAD v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.build.outputs.artifact }}
